// ─────────────────────────────────────────────────────────────────
// ADMIN — TERMS MANAGEMENT
// ─────────────────────────────────────────────────────────────────
function AdminTerms() {
  const { data: terms, loading, reload } = useData(() => apiFetch('/admin/terms'));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({
    term_code:'', term_name:'', academic_year:'', term_type:'ODD',
    start_date:'', end_date:'', registration_start_date:'', registration_end_date:''
  });
  const [saving, setSaving] = useState(false);
  const [setting, setSetting] = useState(null);
  const [msg, setMsg] = useState(null);

  function set(k){ return v => setForm(f=>({...f,[k]:v})); }

  async function createTerm(e) {
    e.preventDefault(); setSaving(true); setMsg(null);
    try {
      const res = await apiFetch('/admin/terms', { method:'POST', body: JSON.stringify(form) });
      setMsg({ type:'ok', text: res.message });
      setForm({ term_code:'', term_name:'', academic_year:'', term_type:'ODD',
                start_date:'', end_date:'', registration_start_date:'', registration_end_date:'' });
      setShowForm(false); reload();
    } catch(e) { setMsg({ type:'err', text:e.message }); }
    finally { setSaving(false); }
  }

  async function setCurrent(term_id) {
    setSetting(term_id); setMsg(null);
    try {
      const res = await apiFetch(`/admin/terms/${term_id}/current`, { method:'PATCH' });
      setMsg({ type:'ok', text: res.message }); reload();
    } catch(e) { setMsg({ type:'err', text:e.message }); }
    finally { setSetting(null); }
  }

  if (loading) return React.createElement(Spinner);

  return React.createElement('div', null,
    React.createElement('div', { className:'page-header', style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'} },
      React.createElement('div', null,
        React.createElement('div', { className:'page-title' }, '📅 Academic Terms'),
        React.createElement('div', { className:'page-sub' }, 'Manage terms and registration windows')
      ),
      React.createElement('button', { className:'btn btn-primary', onClick:()=>setShowForm(s=>!s) },
        showForm ? '✕ Cancel' : '⊕ New Term')
    ),

    msg && React.createElement(AdminAlert, { type:msg.type, msg:msg.text }),

    showForm && React.createElement('div', { className:'card', style:{marginBottom:24} },
      React.createElement('div', { className:'card-header' },
        React.createElement('div', { className:'card-title' }, 'Create Academic Term')
      ),
      React.createElement('div', { className:'card-body' },
        React.createElement('form', { onSubmit:createTerm },
          React.createElement('div', { style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16} },
            React.createElement(AdminFormInput,{label:'Term Code',value:form.term_code,onChange:set('term_code'),placeholder:'e.g. ODD-2026-27',required:true}),
            React.createElement(AdminFormInput,{label:'Term Name',value:form.term_name,onChange:set('term_name'),placeholder:'e.g. ODD Semester 2026-27',required:true}),
            React.createElement(AdminFormInput,{label:'Academic Year',value:form.academic_year,onChange:set('academic_year'),placeholder:'e.g. 2026-27',required:true}),
            React.createElement('div',{className:'form-group'},
              React.createElement('label',null,'Term Type',React.createElement('span',{style:{color:'var(--red)',marginLeft:4}},'*')),
              React.createElement('select',{value:form.term_type,onChange:e=>setForm(f=>({...f,term_type:e.target.value})),required:true,
                style:{width:'100%',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',
                       borderRadius:8,color:'var(--text)',fontFamily:'var(--font)',fontSize:14}},
                ['ODD','EVEN','SUMMER'].map(t=>React.createElement('option',{key:t,value:t},t))
              )
            ),
            React.createElement(AdminFormInput,{label:'Start Date',value:form.start_date,onChange:set('start_date'),type:'date',required:true}),
            React.createElement(AdminFormInput,{label:'End Date',value:form.end_date,onChange:set('end_date'),type:'date',required:true}),
            React.createElement(AdminFormInput,{label:'Registration Opens',value:form.registration_start_date,onChange:set('registration_start_date'),type:'date',required:true}),
            React.createElement(AdminFormInput,{label:'Registration Closes',value:form.registration_end_date,onChange:set('registration_end_date'),type:'date',required:true}),
          ),
          React.createElement('div',{style:{marginTop:20}},
            React.createElement('button',{className:'btn btn-primary',type:'submit',disabled:saving},
              saving?'Creating…':'Create Term →')
          )
        )
      )
    ),

    React.createElement('div', { className:'card' },
      React.createElement('div', { className:'card-body', style:{padding:0} },
        React.createElement('table', { className:'data-table' },
          React.createElement('thead',null,React.createElement('tr',null,
            ['Term Code','Name','Year','Type','Dates','Reg Window','Status','Action'].map(h=>
              React.createElement('th',{key:h},h))
          )),
          React.createElement('tbody',null,
            (terms||[]).map((t,i)=>
              React.createElement('tr',{key:i},
                React.createElement('td',null,React.createElement('code',{style:{fontSize:12}},t.term_code)),
                React.createElement('td',null,t.term_name),
                React.createElement('td',null,t.academic_year),
                React.createElement('td',null,React.createElement(Badge,{type:'blue'},t.term_type)),
                React.createElement('td',null,
                  React.createElement('span',{style:{fontSize:11,color:'var(--muted)'}},
                    (t.start_date?new Date(t.start_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'?'),
                    ' → ',
                    (t.end_date?new Date(t.end_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'?')
                  )
                ),
                React.createElement('td',null,
                  React.createElement('span',{style:{fontSize:11,color:'var(--muted)'}},
                    (t.registration_start_date?new Date(t.registration_start_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'?'),
                    ' – ',
                    (t.registration_end_date?new Date(t.registration_end_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'?')
                  )
                ),
                React.createElement('td',null,
                  React.createElement(Badge,{
                    type:t.term_status==='ACTIVE'?'green':t.term_status==='REG_OPEN'?'yellow':t.term_status==='UPCOMING'?'blue':'gray'
                  },t.term_status)
                ),
                React.createElement('td',null,
                  t.is_current==='Y'
                    ? React.createElement('span',{style:{fontSize:11,color:'var(--green)',fontWeight:600}},'✓ Current')
                    : React.createElement('button',{
                        className:'btn btn-sm',
                        style:{fontSize:11,padding:'4px 10px'},
                        disabled:setting===t.term_id,
                        onClick:()=>setCurrent(t.term_id)
                      }, setting===t.term_id?'…':'Set Current')
                )
              )
            )
          )
        )
      )
    )
  );
}

// ─────────────────────────────────────────────────────────────────
// ROOT APP  (updated with admin routing)
// ─────────────────────────────────────────────────────────────────
function App() {
  const [auth] = useAuth();
  const [page, setPage] = useState('dashboard');

  if (!auth) return React.createElement(LoginPage);

  const studentPages = {
    dashboard:    () => React.createElement(StudentDashboard, { auth }),
    registration: () => React.createElement(CourseRegistration),
    attendance:   () => React.createElement(AttendancePage),
    timetable:    () => React.createElement(TimetablePage),
  };
  const facultyPages = {
    dashboard:         () => React.createElement(FacultyDashboard, { auth }),
    sections:          () => React.createElement(SectionsPage),
    'float-section':   () => React.createElement(FloatSectionPage),
    'attendance-mgmt': () => React.createElement(AttendanceMgmt),
    schedule:          () => React.createElement(SchedulePage),
    reports:           () => React.createElement(ReportsPage),
  };
  const adminPages = {
    dashboard:          () => React.createElement(AdminDashboard, { auth }),
    students:           () => React.createElement(AdminStudents),
    'register-student': () => React.createElement(AdminRegisterStudent),
    faculty:            () => React.createElement(AdminFaculty),
    'register-faculty': () => React.createElement(AdminRegisterFaculty),
    'create-course':    () => React.createElement(AdminCreateCourse),
    offerings:          () => React.createElement(AdminFloatOffering),
    terms:              () => React.createElement(AdminTerms),
  };

  const pages =
    auth.role === 'student' ? studentPages :
    auth.role === 'faculty' ? facultyPages :
    adminPages;

  const sidebarPages =
    auth.role === 'student' ? STUDENT_PAGES :
    auth.role === 'faculty' ? FACULTY_PAGES :
    ADMIN_PAGES;

  const PageComponent = pages[page] || pages['dashboard'];

  return React.createElement('div', { className: 'app-shell' },
    React.createElement(Sidebar, { auth, page, setPage, pages: sidebarPages }),
    React.createElement('main', { className: 'main-content' },
      React.createElement(PageComponent)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
